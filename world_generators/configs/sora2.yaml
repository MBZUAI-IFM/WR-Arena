_target_: world_generators.sora2.Sora2
generation_type: i2v
model_name: sora2

api_key_env: SORA2_API_KEY
model_version: "sora-2"
default_seconds: 4

# ───────────────────────── inference section ────────────────────────
inference: 
  resolution: [1280, 720]
  frame_num: 120  # Total frames to generate

helper_config:
  output_root: outputs/action_simulation_fidelity/sora2
  fps: 30  # Used for video creation