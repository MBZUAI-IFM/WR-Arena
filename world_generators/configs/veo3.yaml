_target_: world_generators.veo3.Veo3
generation_type: i2v
model_name: veo3_i2v

# Veo3 constructor parameters
api_key_env: VEO3_API_KEY
model_version: "veo-3.1-fast-generate-preview"
default_seconds: 4

# ───────────────────────── inference section ────────────────────────
inference:
  # Video generation settings  
  resolution: [1280, 720]
  frame_num: 96  # Total frames to generate

helper_config:
  output_root: outputs/action_simulation_fidelity/veo3
  fps: 24  # Used for video creation